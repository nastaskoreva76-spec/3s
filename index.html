<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Room</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="sky"></div>
<div class="darkness"></div>

<div class="intro" id="intro">
    <h1>Welcome to my home<br>Click to enter</h1>
</div>

<div class="room" id="room">

    <img src="assets/back.png" class="background">

    <img src="assets/sofa.png" class="item sofa" id="sofa">
    <img src="assets/table.png" class="item table">

    <!-- RIGHT TABLE -->
    <img src="assets/tableright.png" class="item tableright" id="tableRight">

    <!-- LIGHT INSIDE -->
    <div class="table-light" id="tableLight"></div>

    <!-- TEXTS -->
    <div class="tea-note" id="teaNote">
        Time for tea and cozy conversations
    </div>

    <div class="tea-note second" id="teaNote2">
        Take the cups
    </div>

    <!-- ITEMS -->
    <img src="assets/book.png" class="inside-item book" id="book">
    <img src="assets/cup1.png" class="inside-item cup1" id="cup1">
    <img src="assets/cup2.png" class="inside-item cup2" id="cup2">

    <img src="assets/nature.png" class="item decor">

</div>

<script>
const intro = document.getElementById("intro");
const room = document.getElementById("room");

const tableRight = document.getElementById("tableRight");
const tableLight = document.getElementById("tableLight");

const teaNote = document.getElementById("teaNote");
const teaNote2 = document.getElementById("teaNote2");

const cup1 = document.getElementById("cup1");
const cup2 = document.getElementById("cup2");
const book = document.getElementById("book");

/* ENTER */
intro.addEventListener("click", () => {
    intro.classList.add("hide");
    room.classList.add("show");
});

/* SCENE */
let stage = 0;

tableRight.addEventListener("click", () => {

    if(stage === 0){
        teaNote.classList.add("show");
        stage = 1;
        return;
    }

    if(stage === 1){

        teaNote.classList.remove("show");

        tableRight.classList.add("open");

        setTimeout(() => {
            tableRight.src = "assets/opentableright.png";
        }, 200);

        tableLight.classList.add("show");

        setTimeout(() => {
            teaNote2.classList.add("show");
        }, 500);

        setTimeout(() => {
            cup1.classList.add("show");
            cup2.classList.add("show");
            book.classList.add("show");
        }, 700);

        stage = 2;
    }
});

/* FIXED DRAG (smooth) */
function makeDraggable(el){
    let drag = false;
    let offsetX = 0;
    let offsetY = 0;

    el.addEventListener("mousedown", (e) => {
        drag = true;
        el.style.zIndex = 9999;

        const rect = el.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    });

    document.addEventListener("mousemove", (e) => {
        if(!drag) return;
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => {
        drag = false;
    });
}

makeDraggable(cup1);
makeDraggable(cup2);
makeDraggable(book);
</script>

</body>
</html>
